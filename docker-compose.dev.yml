version: "3.8"

services:
  uptime-kuma-dev:
    image: node:20
    container_name: uptime-kuma-dev
    working_dir: /app
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: >
      sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development

volumes:
  node_modules:
